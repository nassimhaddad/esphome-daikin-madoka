esphome:
  name: madoka-bridge
  friendly_name: Madoka Bridge

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Madoka-Bridge Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  js_url: ""
  css_url: ""
  js_include: madoka-ui.js

external_components:
  - source: github://Petapton/esphome@madoka
    components: [daikin_madoka]

esp32_ble_tracker:

esp32_ble:
  io_capability: display_yes_no

ble_client:
  - mac_address: EC:47:0C:EA:22:53
    id: madoka_ble

climate:
  - platform: daikin_madoka
    name: "Madoka Climate"
    ble_client_id: madoka_ble
    update_interval: 15s

# Only if you don't already have a time source — TLS needs a real clock
# to check the certificate's validity dates, or the handshake fails.
time:
  - platform: sntp

mqtt:
  broker: !secret hivemq_broker
  port: 8883
  username: !secret hivemq_user
  password: !secret hivemq_pass
  topic_prefix: madoka                         # makes your topics predictable
  discovery: false                             # you're not on Home Assistant; keeps the broker tidy
  skip_cert_cn_check: true                     # see note below
