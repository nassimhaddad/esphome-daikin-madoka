esphome:
  name: daikin-madoka
  friendly_name: Daikin Madoka

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://Petapton/esphome@madoka
    components: [daikin_madoka]

logger:

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min      # reboot if WiFi is lost this long
  ap:
    ssid: "Daikin-Madoka Fallback"
    password: !secret fallback_password

captive_portal:

# ---- Bluetooth to the Madoka (your tested config) ----
esp32_ble_tracker:

esp32_ble:
  io_capability: display_yes_no

ble_client:
  - mac_address: EC:47:0C:EA:22:53
    id: madoka_ble

# ---- The thermostat entity (your tested config) ----
climate:
  - platform: daikin_madoka
    name: "Madoka Climate"
    ble_client_id: madoka_ble
    update_interval: 60s

