esphome:
  name: madoka-bridge
  friendly_name: Madoka Bridge

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Madoka-Bridge Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80

external_components:
  - source: github://Petapton/esphome@madoka
    components: [daikin_madoka]

esp32_ble_tracker:

esp32_ble:
  io_capability: display_yes_no

ble_client:
  - mac_address: EC:47:0C:EA:22:53
    id: madoka_ble

climate:
  - platform: daikin_madoka
    name: "Madoka Climate"
    ble_client_id: madoka_ble
    update_interval: 15s